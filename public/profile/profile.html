<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Eventify</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../profile/profilestyle.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark ev-navbar">
    <div class="container">
      <a class="navbar-brand ev-brand" href="../home/home.html">
        <span class="brand-dot"></span>Eventify
      </a>

      <div class="d-flex align-items-center gap-2 ms-auto">
        <a href="../home/home.html" class="btn ev-btn-ghost">Dashboard</a>
        <button id="logoutBtn" class="btn ev-btn-danger">Logout</button>
      </div>
    </div>
  </nav>

  <main class="profile-shell">
    <div class="container">
      <div class="profile-header">
        <p class="profile-eyebrow">Account Center</p>
        <h1>My Profile</h1>
        <p>Review your account details and keep your password up to date.</p>
      </div>

      <div id="pageAlert" class="alert d-none" role="alert"></div>

      <div class="row g-4 align-items-start">
        <div class="col-lg-5">
          <section class="profile-card">
            <div class="profile-avatar" id="profileAvatar">E</div>
            <h2 id="profileName">Loading...</h2>

            <div class="profile-details">
              <div>
                <span>Full Name</span>
                <strong id="detailName">-</strong>
              </div>
              <div>
                <span>Email Address</span>
                <strong id="detailEmail">-</strong>
              </div>
              <div>
                <span>Phone Number</span>
                <strong id="detailPhone">-</strong>
              </div>
              <div>
                <span>Age</span>
                <strong id="detailAge">-</strong>
              </div>
              <div>
                <span>Gender</span>
                <strong id="detailGender">-</strong>
              </div>
            </div>
          </section>
        </div>

        <div class="col-lg-7">
          <section class="profile-panel">
            <div class="panel-heading">
              <h2>Change Password</h2>
              <p>Use a strong password with uppercase, lowercase, and a number.</p>
            </div>

            <div id="passwordAlert" class="alert d-none" role="alert"></div>

            <div class="mb-3">
              <label class="profile-label">Current Password</label>
              <input id="currentPassword" type="password" class="form-control profile-input" autocomplete="current-password" />
            </div>

            <div class="mb-3">
              <label class="profile-label">New Password</label>
              <input id="newPassword" type="password" class="form-control profile-input" autocomplete="new-password" />
            </div>

            <div class="mb-4">
              <label class="profile-label">Confirm New Password</label>
              <input id="confirmPassword" type="password" class="form-control profile-input" autocomplete="new-password" />
            </div>

            <button id="changePasswordBtn" class="btn profile-btn-primary">
              Update Password
            </button>
          </section>
        </div>
      </div>

      <section id="profileBookingsSection" class="profile-bookings-section">
        <div class="section-heading">
          <div>
            <p class="profile-eyebrow">Tickets</p>
            <h2>My Bookings</h2>
          </div>
          <span id="profileBookingsCount" class="profile-count">0 bookings</span>
        </div>

        <div id="profileBookings" class="row g-4"></div>
      </section>
    </div>
  </main>

  <script src="../profile/profilescript.js"></script>
</body>
</html>
