<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Eventify</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/register/registerstyle.css"/>
</head>
<body>

<div class="auth-layout">

  <!-- Left Panel -->
  <div class="auth-left d-none d-lg-flex">
    <div class="auth-left-inner">
      <a href="../home/home.html" class="ev-brand">
        <span class="brand-dot"></span>Eventify
      </a>
      <div class="auth-tagline">
        <h2>Your next great<br/>experience starts here.</h2>
        <p>Join thousands of event-goers today.</p>
      </div>
      <div class="auth-decor-circles">
        <div class="dc dc1"></div>
        <div class="dc dc2"></div>
        <div class="dc dc3"></div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="auth-right">
    <div class="auth-form-wrap">

      <a href="../home/home.html" class="ev-brand d-lg-none mb-5 d-inline-flex">
        <span class="brand-dot"></span>Eventify
      </a>

      <div class="auth-form-header">
        <h1 class="auth-title">Create account</h1>
        <p class="auth-subtitle">Free forever. No credit card required.</p>
      </div>

      <div id="errorMsg" class="auth-error" style="display:none;"></div>
      <div id="successMsg" class="auth-success" style="display:none;"></div>

      <div class="mb-3">
        <label class="auth-label">Full Name</label>
        <input id="name" type="text" class="form-control auth-input" placeholder="Jane Smith"/>
      </div>

      <div class="mb-3">
        <label class="auth-label">Email Address</label>
        <input id="email" type="email" class="form-control auth-input" placeholder="you@example.com"/>
      </div>

      <div class="mb-3">
        <label class="auth-label">Phone Number</label>
        <input id="phone" type="tel" class="form-control auth-input" placeholder="01012345678"/>
      </div>

      <div class="row">
        <div class="col-6 mb-3">
          <label class="auth-label">Age</label>
          <input id="age" type="number" min="13" max="120" class="form-control auth-input" placeholder="21"/>
        </div>

        <div class="col-6 mb-3">
          <label class="auth-label">Gender</label>
          <select id="gender" class="form-select auth-input">
            <option value="">Choose</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
            <option value="Other">Other</option>
            <option value="Prefer not to say">Prefer not to say</option>
          </select>
        </div>
      </div>

     <div class="mb-4">
  <label class="auth-label">Password</label>

  <input
    id="password"
    type="password"
    class="form-control auth-input"
    placeholder="Minimum 8 characters"
    autocomplete="new-password"
  />

  <div class="form-text mt-2">
    Password must contain uppercase, lowercase, and a number.
  </div>
</div>

      <button onclick="register()" class="btn auth-btn-primary w-100 mb-4">
        Create Account
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="margin-left:8px;vertical-align:-2px"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
      </button>

      <div class="auth-divider"><span>or</span></div>
      <div id="googleSignUpButton" class="google-auth-button mb-4"></div>
      <div id="googleMsg" class="auth-error" style="display:none;"></div>

      <p class="auth-switch">
        Already have an account?
        <a href="../login/login.html" class="auth-link">Sign in</a>
      </p>

    </div>
  </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="/register/registerscript.js"></script>
</body>
</html>
