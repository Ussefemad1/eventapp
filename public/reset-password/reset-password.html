<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Reset Password - Eventify</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="../reset-password/reset-password.css"
  />

</head>

<body class="d-flex align-items-center justify-content-center">

  <div class="card reset-card p-4 p-md-5">

    <div class="reset-header">

      <div class="reset-logo">
        E
      </div>

      <h1 class="reset-title">
        Reset Password
      </h1>

      <p class="reset-subtitle">
        Enter your new secure password for Eventify.
      </p>

    </div>

    <div id="msg" class="alert d-none"></div>

    <div class="mb-3">

      <label class="form-label">
        New Password
      </label>

      <input
        type="password"
        id="newPassword"
        class="form-control"
        placeholder="Enter new password"
      />

      <div class="password-hint">
        Must contain uppercase, lowercase, number and 8+ characters.
      </div>

    </div>

    <div class="mb-4">

      <label class="form-label">
        Confirm Password
      </label>

      <input
        type="password"
        id="confirmPassword"
        class="form-control"
        placeholder="Confirm password"
      />

    </div>

    <button
      class="btn btn-success btn-reset w-100"
      onclick="submitReset()"
    >
      Reset Password
    </button>

  </div>

  <script src="../reset-password/reset-password.js"></script>

</body>

</html>
