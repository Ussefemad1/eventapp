<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Eventify</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../reset-password/reset-password.css" />
</head>

<body class="d-flex align-items-center justify-content-center p-3">

  <div class="card reset-card p-4 p-md-5">

    <div class="reset-header">
      <div class="reset-logo">E</div>
      <h1 class="reset-title">Reset Password</h1>
      <p class="reset-subtitle">Enter your new secure password for Eventify.</p>
    </div>

    <div id="msg" class="alert d-none"></div>

    <div class="mb-3">
      <label class="form-label" for="newPassword">New Password</label>
      <div class="field has-toggle">
        <span class="field-icon">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <rect x="4" y="11" width="16" height="9" rx="2"/>
            <path stroke-linecap="round" d="M8 11V8a4 4 0 0 1 8 0v3"/>
          </svg>
        </span>
        <input type="password" id="newPassword" class="form-control" placeholder="Enter new password"/>
        <button type="button" class="pw-toggle" aria-label="Show password" onclick="togglePassword(this, 'newPassword')">
          <svg class="eye-on" width="19" height="19" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="eye-off" width="19" height="19" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M10.6 10.7a2 2 0 0 0 2.8 2.8M9.4 5.6A9.5 9.5 0 0 1 12 5.5c6 0 9.5 6.5 9.5 6.5a16 16 0 0 1-2.9 3.5M6.1 6.7A16 16 0 0 0 2.5 12S6 18.5 12 18.5a9 9 0 0 0 2.6-.4"/>
          </svg>
        </button>
      </div>
      <div class="password-hint">Must contain uppercase, lowercase, number and 8+ characters.</div>
    </div>

    <div class="mb-4">
      <label class="form-label" for="confirmPassword">Confirm Password</label>
      <div class="field has-toggle">
        <span class="field-icon">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <rect x="4" y="11" width="16" height="9" rx="2"/>
            <path stroke-linecap="round" d="M8 11V8a4 4 0 0 1 8 0v3"/>
          </svg>
        </span>
        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password"/>
        <button type="button" class="pw-toggle" aria-label="Show password" onclick="togglePassword(this, 'confirmPassword')">
          <svg class="eye-on" width="19" height="19" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.5 12S6 5.5 12 5.5 21.5 12 21.5 12 18 18.5 12 18.5 2.5 12 2.5 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="eye-off" width="19" height="19" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M10.6 10.7a2 2 0 0 0 2.8 2.8M9.4 5.6A9.5 9.5 0 0 1 12 5.5c6 0 9.5 6.5 9.5 6.5a16 16 0 0 1-2.9 3.5M6.1 6.7A16 16 0 0 0 2.5 12S6 18.5 12 18.5a9 9 0 0 0 2.6-.4"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn btn-success btn-reset w-100" onclick="submitReset()">
      Reset Password
    </button>

  </div>

  <!-- password show/hide toggle (no dependency on reset-password.js) -->
  <script>
    function togglePassword(btn, inputId) {
      const input = document.getElementById(inputId);
      if (!input) return;
      const show = input.type === "password";
      input.type = show ? "text" : "password";
      btn.classList.toggle("is-on", show);
      btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
    }
  </script>

  <script src="../reset-password/reset-password.js"></script>

</body>
</html>
