<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventify</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/home/homestyle.css"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark ev-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand ev-brand" href="#">
      <span class="brand-dot"></span>Eventify
    </a>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <button id="registerBtn" onclick="goRegister()" class="btn ev-btn-ghost">Register</button>
      <button id="loginBtn" onclick="goLogin()" class="btn ev-btn-white">Login</button>
      <button id="logout" onclick="logout()" class="btn ev-btn-danger" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="margin-right:6px;vertical-align:-2px"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/></svg>
        Logout
      </button>
    </div>
  </div>
</nav>

<!-- Hero Welcome -->
<div class="ev-hero">
  <div class="container">
    <div class="ev-welcome-inner">
      <div>
        <p class="ev-eyebrow">Your Event Dashboard</p>
        <h1 class="ev-hero-title">Welcome to <span class="text-accent">Eventify</span></h1>
        <p id="userInfo" class="ev-hero-sub"></p>
      </div>
      <div class="ev-hero-badge">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="#1a7a4a" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Live Events</span>
      </div>
    </div>
  </div>
</div>

<div class="container ev-main">

  <!-- Admin Panel -->
  <div id="adminPanel" class="ev-admin-panel mb-5" style="display:none;">
    <div class="ev-section-header mb-4">
      <span class="ev-chip ev-chip-admin">Admin</span>
      <h2 class="ev-section-title mb-0">Create New Event</h2>
    </div>
    <div class="row g-3">
      <div class="col-md-6">
        <div class="ev-input-wrap">
          <label class="ev-label">Event Name</label>
          <input id="ename" class="form-control ev-input" placeholder="e.g. Summer Gala 2025"/>
        </div>
      </div>
      <div class="col-md-6">
        <div class="ev-input-wrap">
          <label class="ev-label">Category</label>
          <input id="ecat" class="form-control ev-input" placeholder="e.g. Music, Tech, Sports"/>
        </div>
      </div>
      <div class="col-md-6">
        <div class="ev-input-wrap">
          <label class="ev-label">Venue</label>
          <input id="evenue" class="form-control ev-input" placeholder="e.g. Cairo Convention Center"/>
        </div>
      </div>
      <div class="col-md-3">
        <div class="ev-input-wrap">
          <label class="ev-label">Available Seats</label>
          <input id="eseats" type="number" class="form-control ev-input" placeholder="100"/>
        </div>
      </div>
      <div class="col-md-3">
        <div class="ev-input-wrap">
          <label class="ev-label">Price (EGP)</label>
          <input id="eprice" type="number" class="form-control ev-input" placeholder="0"/>
        </div>
      </div>
    </div>
    <div class="mt-4">
      <button id="createEventBtn" onclick="addEvent()" class="btn ev-btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="margin-right:7px;vertical-align:-2px"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Create Event
      </button>
    </div>
  </div>

  <!-- Events Section -->
  <div class="ev-section-header mb-4">
    <h2 class="ev-section-title mb-0">Upcoming Events</h2>
    <span class="ev-count" id="eventsCount">0 events</span>
  </div>
  <div id="events" class="row g-4 mb-2"></div>

  <div class="ev-divider my-5"></div>

  <!-- Bookings Section -->
  <div class="ev-section-header mb-4">
    <h2 class="ev-section-title mb-0">My Bookings</h2>
    <span class="ev-count" id="bookingsCount">0 bookings</span>
  </div>
  <div id="bookings" class="row g-4 mb-5"></div>

</div>

<!-- Footer -->
<footer class="ev-footer">
  <div class="container">
    <span class="ev-brand-sm">Eventify</span>
    <span class="ev-footer-copy">© 2025 All rights reserved.</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="/home/homescript.js"></script>
</body>
</html>
